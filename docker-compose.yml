version: '2'
services:

  server:
    image: ukeeper/ureadability:master
    build: .
    hostname: ureadability
    restart: always
    container_name: ureadability
    logging: &default
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

    depends_on:
      - mongo

    environment:
      - MONGO=mongo
      - MONGO_PASSWD=Squid3kIc6Dew4ad8Ci5
      - MONGO_DELAY=10
      - CREDS=test:$$apr1$q0x6vkft$$s9Lg0jra3GpJ3St0ogepy/
      - DEBUG
    volumes:
      - ./logs:/srv/logs
    ports:
      - 8080:8080

  nginx:
    build: nginx
    restart: always
    hostname: nginx
    container_name: ureadability-nginx
    logging: *default

    links:
      - server:ureadability
    ports:
      - "8781:80"
    environment:
      - NGINX_ADMIN=admin:$$apr1$$pDxqiBaw$$ZarbwfQAjupM3Tg9r/XcR0
      - NGINX_TEST=test:$$apr1$$5s9yoqp3$$NdZSCZr7VTmLEc8Bv/bmq1

  mongo:
    image: mongo:4.4
    logging: *default
    hostname: mongo
    restart: always
    container_name: ureadability-mongo

    environment:
      - MONGO_INITDB_DATABASE=admin
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=Squid3kIc6Dew4ad8Ci5
    volumes:
      - /tmp/mongodb:/data/db
